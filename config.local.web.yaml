openai_agents:
  provider: github_copilot
  tracing_enabled: true

harness:
  platform: web
  web:
    backend: playwright
    channel: chrome
    headless: false
    base_url: null

execution:
  post_action_delay_seconds:
    platform: 1.0
    common: 0.0

runtime_secrets:
  allowed_env_names:
    - TEST_ACCOUNT_EMAIL
    - TEST_ACCOUNT_PASSWORD

agent_context:
  knowledge:
    root_dir: ./knowledge
    skills:
      dir: skills
      items:
        - name: automation-basics
          description: Semantic action and evidence guidance for local runs.
          kind: markdown
          path: automation-basics.md
          required: true
        - name: web-harness
          description: Web harness action selection and recovery guidance.
          kind: markdown
          path: web-harness.md
          required: true
