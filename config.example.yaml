agent:
  name: fsq-agent
  model: gpt-5.4
  max_steps: 50
  step_timeout_seconds: 60
  max_retries: 3

openai_agents:
  enabled: true
  base_url: https://edgeqa-resource.cognitiveservices.azure.com/openai/v1/
  api_key_env: AZURE_OPENAI_API_KEY
  model: gpt-5.4
  max_turns: 50
  tracing_enabled: false
  trace_include_sensitive_data: false
  use_responses: true
  prompt:
    agent_template_path: ./fsq_agent/agent/templates/agent_instructions.j2
    task_template_path: ./fsq_agent/agent/templates/task_input.j2
    custom_instructions:
      - Prefer targeted artifact searches over full artifact reads when recovering details from large tool outputs.
    variables: {}
  context_trimming:
    enabled: true
    recent_turns: 2
    max_tool_output_chars: 8000
    preview_chars: 1000
    trimmable_tools: []
  local_tool_output:
    artifact_enabled: true
    always_write_artifact: true
    artifact_subdir: artifacts/tools
    recent_full_output_count: 3
    full_output_max_chars: 30000
    historical_output_mode: artifact_reference
    historical_preview_chars: 1000
    model_response_max_chars: 4000

lifecycle:
  controller: none
  options: {}

verification:
  # strict: goal + all key actions; normal: goal + assertion key actions; goal: goal only.
  mode: normal

mcp_tool_validation:
  enabled: true
  invalid_tool_policy: auto_ignore
  # Also controls OpenAI Agents SDK MCP schema conversion via convert_schemas_to_strict.
  strict_schema: true
  fail_when_all_tools_filtered: true

runtime_secrets:
  allowed_env_names: []

mcp_servers:
  - name: browser
    transport: stdio
    command: npx
    args: ["-y", "@playwright/mcp@latest"]
    require_approval: never
    load_prompts: false
    timeout_seconds: 60

skills:
  - name: automation-basics
    description: Describes how the agent should use configured CLI and MCP tools for automation tasks.
    kind: markdown
    path: automation-basics.md
    required: true

shell:
  enabled: false
  # Use allowlist for normal operation. Use allow_all only for intentionally unrestricted local runs.
  mode: allowlist
  command_allowlist: [python, node, npm, npx]
  timeout_seconds: 60
  working_dir: .

workspace:
  root_dir: ./.fsq-agent-workspace
  marker_file: .fsq-agent-workspace
  auto_init: true

cases:
  dir: ./cases

cli_tools:
  - name: echo
    command: python
    args: ["-c", "import sys; print(' '.join(sys.argv[1:]))"]
    description: Echo arguments for smoke tests.
    timeout_seconds: 10

output:
  root_dir: output
  runs_dir: runs

knowledge_dir: ./knowledge