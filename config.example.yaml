openai_agents:
  provider: github_copilot
  tracing_enabled: true

harness:
  platform: android
  android:
    backend: uiautomator2
  evidence:
    capture_before: true
    capture_after: true
    capture_on_failure: true
    artifact_kinds:
      - screenshot
  strict_core:
    step_interval_seconds: 1.0
    evidence:
      capture_before: true
      capture_after: true
      capture_on_failure: true
      artifact_kinds:
        - screenshot

runtime_secrets:
  allowed_env_names:
    - TEST_ACCOUNT_EMAIL
    - TEST_ACCOUNT_PASSWORD

agent_context:
  knowledge:
    root_dir: ./knowledge
    skills:
      dir: skills
      items:
        - name: automation-basics
          description: Semantic action and evidence guidance for local runs.
          kind: markdown
          path: automation-basics.md
          required: true
        - name: android-harness
          description: Android harness action selection and recovery guidance.
          kind: markdown
          path: android-harness.md
          required: true
    pre_plan:
      dir: project_android_v1
