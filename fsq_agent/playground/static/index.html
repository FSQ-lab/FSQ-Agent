<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FSQ-Agent Playground</title>
    <link rel="stylesheet" href="/playground.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel control-panel">
        <header class="topbar">
          <div>
            <h1>FSQ-Agent Playground</h1>
            <p id="server-status" class="status-pill status-connecting">Connecting...</p>
          </div>
          <button id="refresh" type="button">Clear</button>
        </header>

        <section class="section progress-section">
          <h2>Progress</h2>
          <div id="progress-run-id" class="progress-run-id" hidden></div>
          <div id="progress" class="progress-log"></div>
        </section>

        <section class="section">
          <h2>Session</h2>
          <div class="session-row">
            <select id="device-select" aria-label="ADB device"></select>
            <button id="create-session" type="button">Use Selected</button>
            <button id="destroy-session" type="button">Disconnect</button>
          </div>
          <p id="session-message" class="muted"></p>
        </section>

        <section class="section run-section">
          <h2>Run</h2>
          <div class="run-mode-row" role="radiogroup" aria-label="Run mode">
            <label><input type="radio" name="run-mode" value="goal" checked /> Goal</label>
            <label><input type="radio" name="run-mode" value="yaml" /> YAML</label>
            <label><input type="radio" name="run-mode" value="strict-yaml" /> Strict YAML</label>
          </div>
          <textarea id="goal" rows="5" placeholder="Describe the Android task to run..."></textarea>
          <input id="case-yaml" type="text" placeholder="Path to .codex.yaml..." hidden />
          <button id="run-selected" type="button" class="primary">Run</button>
        </section>
      </section>

      <section class="panel preview-panel">
        <header class="preview-header">
          <div>
            <div class="preview-tabs" role="tablist" aria-label="Preview and report">
              <button id="preview-tab" class="tab-button active" type="button" role="tab" aria-selected="true" aria-controls="preview-pane">Preview</button>
              <button id="report-tab" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="report-pane">Report</button>
            </div>
            <p id="runtime-info" class="muted">No runtime info yet.</p>
          </div>
          <button id="replay-screenshots" type="button">Replay</button>
        </header>
        <div id="preview-pane" class="tab-pane preview-frame" role="tabpanel" aria-labelledby="preview-tab">
          <video id="replay-video" controls hidden></video>
          <img id="screenshot" alt="Android screenshot preview" />
          <p id="preview-empty">Screenshot preview will appear here.</p>
        </div>
        <div id="report-pane" class="tab-pane report-pane" role="tabpanel" aria-labelledby="report-tab" hidden>
          <div id="report-content" class="report-content">No report yet.</div>
        </div>
      </section>
    </main>
    <script src="/playground.js"></script>
  </body>
</html>
